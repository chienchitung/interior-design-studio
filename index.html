<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoomWise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #171717; /* neutral-900 */
        color: #ffffff;
      }

      /* ── Roomwise Brand Typography ── */
      .brand-wordmark {
        font-family: 'Figtree', sans-serif;
        font-size: clamp(2.25rem, 6vw, 3rem);
        letter-spacing: -0.04em;
        line-height: 1;
        display: block;
      }
      .brand-room {
        font-weight: 400;
        color: #A8A29E;
      }
      .brand-wise {
        font-weight: 600;
        color: #FFFFFF;
      }
      .brand-subtitle {
        font-family: 'Figtree', sans-serif;
        font-size: 0.875rem;
        font-weight: 400;
        color: #737373;
        letter-spacing: 0.04em;
        line-height: 1.7;
        margin-top: 1rem;
        margin-bottom: 2rem;
      }
      /* Custom scrollbar for Webkit */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #262626; 
      }
      ::-webkit-scrollbar-thumb {
        background: #525252; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #737373; 
      }
    </style>
